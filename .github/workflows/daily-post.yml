name: Discord Daily Post

on:
  schedule:
    # UTC 0:03 = JST 9:03（毎朝9時頃）
    - cron: "3 0 * * *"
  workflow_dispatch: {}

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Post daily message to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: bash post.sh
